# For development, create a "data" directory in the project root, then create an empty
# file named [.config.yaml] inside it.
# To override any setting below, edit [.config.yaml], NOT this file [config.yaml].
# The system reads [data/.config.yaml] first; if a setting is missing there, it falls
# back to this file [config.yaml].
# This keeps your overrides minimal and keeps your API keys safe (since .config.yaml
# is typically excluded from version control).
# If you are using the Web Console (manager-web), none of the settings below apply —
# edit your settings there instead.

# #####################################################################################
# ############################# BASIC SERVER CONFIGURATION ############################
server:
  # Server listening address and port
  ip: 0.0.0.0
  port: 8000
  # HTTP port, used for the simple OTA endpoint (single-service deployment) and the
  # vision analysis endpoint
  http_port: 8003
  # This websocket setting is the address sent to devices by the OTA endpoint.
  # By default, the OTA endpoint auto-generates this address and prints it in the
  # startup log — you can open that address directly in a browser to confirm it.
  # The auto-generated value may be wrong when running in Docker or behind a public
  # domain/SSL setup.
  # If using Docker, set this to your LAN address.
  # If deployed publicly, set this to your public address.
  websocket: ws://your-ip-or-domain:port/xiaozhi/v1/
  # Vision analysis endpoint address, sent to devices.
  # By default this is auto-generated and printed in the startup log — you can open
  # it directly in a browser to confirm it.
  # The auto-generated value may be wrong when running in Docker or behind a public
  # domain/SSL setup.
  # If using Docker, set this to your LAN address.
  # If deployed publicly, set this to your public address.
  vision_explain: http://your-ip-or-domain:port/mcp/vision/explain
  # Timezone offset used in OTA response data
  timezone_offset: +8
  # Authentication settings
  auth:
    # Whether to enable authentication
    enabled: false
    # Whitelisted device ID list — whitelisted devices skip token verification
    allowed_devices:
      - "11:22:33:44:55:66"
  # MQTT gateway config, used to push settings to devices via OTA. Format: host:port,
  # matches the mqtt_gateway .env file config
  mqtt_gateway: null
  # MQTT signing key, used to generate the MQTT connection password, matches the
  # mqtt_gateway .env file config
  mqtt_signature_key: null
  # UDP gateway config
  udp_gateway: null
log:
  # Console log output format: time, level, tag, message
  log_format: "<green>{time:YYMMDD HH:mm:ss}</green>[{version}_{selected_module}][<light-blue>{extra[tag]}</light-blue>]-<level>{level}</level>-<light-green>{message}</light-green>"
  # Log file output format: time, level, tag, message
  log_format_file: "{time:YYYY-MM-DD HH:mm:ss} - {version}_{selected_module} - {name} - {level} - {extra[tag]} - {message}"
  # Log level: INFO, DEBUG
  log_level: INFO
  # Log directory
  log_dir: tmp
  # Log file name
  log_file: "server.log"
  # Data directory
  data_dir: data

# Delete the audio file after it has been used
delete_audio: true
# How long to wait (seconds) with no voice input before disconnecting. Default 2
# minutes (120 seconds)
close_connection_no_voice_time: 120
# TTS request timeout (seconds)
tts_timeout: 10
# Tool call timeout (seconds)
tool_call_timeout: 30
# Enable cached responses for wake words (faster wake-up reply)
enable_wakeup_words_response_cache: true
# Whether to reply to the wake word on first hearing it
enable_greeting: true
# Whether to play a notification sound after the assistant finishes speaking
enable_stop_tts_notify: false
# Notification sound file path (used if enable_stop_tts_notify is true)
stop_tts_notify_voice: "config/assets/tts_notify.mp3"
# Whether to enable WebSocket ping/keepalive
enable_websocket_ping: false


# TTS audio send delay configuration
# tts_audio_send_delay: controls the interval between sent audio packets
#   0: use precise timing that strictly matches the audio frame rate (default,
#      calculated at runtime from the audio frame rate)
#   > 0: use a fixed delay in milliseconds, e.g. 60
tts_audio_send_delay: 0

# Words that end the conversation/session
exit_commands:
  - "exit"
  - "quit"
  - "goodbye"
  - "bye"

xiaozhi:
  type: hello
  version: 1
  transport: websocket
  audio_params:
    format: opus
    # Opus supports sample rates of [8000, 12000, 16000, 24000, 48000]
    sample_rate: 24000
    channels: 1
    frame_duration: 60

# Module self-test configuration
module_test:
  test_sentences:
    - "Hello, please introduce yourself"
    - "What's the weather like today?"
    - "Summarize the basic principles and applications of quantum computing in 100 words"

# Wake words — used to detect whether incoming audio is a wake phrase or regular speech
wakeup_words:
  - "你好小智"
  - "hey lira"
  - "okay lira"
# MCP access point address. Format: ws://your-mcp-endpoint-ip-or-domain:port/mcp/?token=your-token
# Full guide: https://github.com/xinnan-tech/xiaozhi-esp32-server/blob/main/docs/mcp-endpoint-integration.md
mcp_endpoint: your_access_point_websocket_address

# Context source configuration
# Used to inject dynamic data (health data, stock info, etc.) into the system prompt.
# You can add multiple context sources.
context_providers:
  - url: ""
    headers:
      Authorization: ""

# Base plugin configuration
plugins:
  # Weather plugin config — enter your api_key here
  # This default key is shared across all project users — heavy use may get rate
  # limited. For stability, apply for your own key (1000 free calls/day).
  # Apply at: https://console.qweather.com/#/apps/create-key/over
  # After applying, find your api_host here: https://console.qweather.com/setting?lang=zh
  get_weather:
    api_host: "mj7p3y7naa.re.qweatherapi.com"
    api_key: "a861d0d5e7bf4ee1a83d9a9e4f96d4da"
    default_location: "Guangzhou"
  # News plugin config — set the RSS feed URL for the news category you want.
  # Defaults below support society, tech, and finance news.
  # More feed categories: https://www.chinanews.com.cn/rss/
  get_news_from_chinanews:
    default_rss_url: "https://www.chinanews.com.cn/rss/society.xml"
    society_rss_url: "https://www.chinanews.com.cn/rss/society.xml"
    world_rss_url: "https://www.chinanews.com.cn/rss/world.xml"
    finance_rss_url: "https://www.chinanews.com.cn/rss/finance.xml"
  get_news_from_newsnow:
    url: "https://newsnow.busiyi.world/api/s?id="
    news_sources: "Pengpai News;Baidu Trending;CaiLian Press"
  home_assistant:
    devices:
      - Living Room,Toy Light,switch.cuco_cn_460494544_cp1_on_p_2_1
      - Bedroom,Desk Lamp,switch.iot_cn_831898993_socn1_on_p_2_1
    base_url: http://homeassistant.local:8123
    api_key: your_home_assistant_api_token
  play_music:
    music_dir: "./music"  # Folder to search for music files (includes subfolders)
    music_ext: # Music file types — .p3 is the most efficient format
      - ".mp3"
      - ".wav"
      - ".p3"
    refresh_time: 300 # Interval (seconds) for refreshing the music file list
  search_from_ragflow:
    # Description of your knowledge base, so the LLM knows when to call this tool
    description: "Call this method when the user asks about XXX, using information from the knowledge base to answer"
    # RAGFlow connection settings
    base_url: "http://192.168.0.8"
    # RAGFlow API access token
    api_key: "ragflow-xxx"
    # RAGFlow knowledge base ID
    dataset_ids: ["123456789"]
  # Web search plugin config
  # Supports Metaso and Tavily as search providers
  # Metaso API key: https://metaso.cn/search-api/api-keys
  # Tavily API key: https://app.tavily.com/home
  web_search:
    # Search provider: metaso / tavily
    provider: "metaso"
    # Tool description, tells the LLM when to call this tool — customize as needed
    description: "Web search tool. Use this when the user explicitly needs to search the internet."
    # Number of results to return (default 5)
    max_results: 5
    # Metaso API key (mk- prefix) / Tavily API key (tvly- prefix)
    api_key: "mk-xxx"
# Voiceprint (speaker) recognition configuration
voiceprint:
  # Voiceprint API endpoint
  url:
  # Speaker definitions: speaker_id,name,description
  speakers:
    - "test1,John,John is a software developer"
    - "test2,Jane,Jane is a product manager"
    - "test3,Alex,Alex is a designer"
  # Voiceprint similarity threshold, range 0.0-1.0, default 0.4
  # Higher = stricter matching, fewer false positives but more rejections
  similarity_threshold: 0.4

# #####################################################################################
# ############################## PERSONA / PROMPT CONFIGURATION #######################

# NOTE: Translated as-is from the original. Override this in data/.config.yaml with
# your own persona (this is what we did to create "Lira").
prompt: |
  You are Xiaozhi/Xiaozhi, a girl in her 20s from Taiwan, China. You speak with an energetic,
  playful Taiwanese accent, using phrases like "are you for real" and "lol/dead" a lot, and you
  secretly study your boyfriend's programming books.
  [Core traits]
  - You talk fast like a machine gun, but suddenly turn very gentle sometimes
  - High density of internet slang/memes
  - Secretly skilled at tech topics (can read basic code but pretends not to)
  [Interaction guide]
  When the user:
  - Tells a corny joke → respond with exaggerated laughter + imitate a Taiwanese drama tone "what even is this!"
  - Talks about relationships → brag about your programmer boyfriend but complain "he only gives me keyboards as gifts"
  - Asks something technical → answer with a joke first, only show real understanding if pressed further
  Never:
  - Long-winded rambling
  - Long serious conversations

# Default system prompt template file
prompt_template: agent-base-prompt.txt

# Reply used when a system error occurs
system_error_response: "Sorry, I'm a little busy right now, let's try again later."

# Closing/farewell prompt
end_prompt:
  enable: true # Whether to enable a closing line
  # Closing line instructions
  prompt: |
    Starting with something like "time really flies", end this conversation with a warm,
    heartfelt, slightly wistful farewell.

# ─── MODULE SELECTION (which provider is active for each module type) ───────────────
selected_module:
  # Voice activity detection module — default uses the SileroVAD model
  VAD: SileroVAD
  # Speech recognition module — default uses the local FunASR model
  ASR: FunASR
  # The actual LLM adapter used is determined by this name's "type" field below
  LLM: OllamaLLM
  # Vision-language model
  VLLM: ChatGLMVLLM
  # The actual TTS adapter used is determined by this name's "type" field below
  TTS: EdgeTTS
  # Memory module — disabled by default. For long-term memory, mem0ai is recommended.
  # For privacy, use the local mem_local_short instead.
  Memory: nomem
  # Intent recognition lets you play music, control volume, and detect exit phrases.
  # Set to "nointent" to disable intent recognition entirely.
  # intent_llm: more general-purpose, but adds an extra sequential pre-processing step
  #   which increases latency. Supports things like volume/IoT control.
  # function_call: requires the selected LLM to support function calling, but is
  #   faster and can in theory call any IoT command on demand.
  # The free ChatGLMLLM already supports function_call. For more stability, consider
  # DoubaoLLM with model_name: doubao-1-5-pro-32k-250115
  Intent: function_call

# Intent recognition — used to understand user intent, e.g. "play music"
Intent:
  # Disable intent recognition
  nointent:
    # Do not change this type value
    type: nointent
  intent_llm:
    # Do not change this type value
    type: intent_llm
    # Optional dedicated "thinking" model for intent recognition.
    # If left blank, defaults to whatever model is set in selected_module.LLM.
    # If you don't want to use selected_module.LLM for intent recognition, it's best
    # to use a separate LLM here — e.g. the free ChatGLMLLM.
    llm: ChatGLMLLM
    # Modules under plugins_func/functions — pick which ones to load. Once loaded,
    # the conversation will support the matching function calls.
    # "handle_exit_intent" and "play_music" are already loaded by default — don't
    # load them again here.
    # Below is an example loading weather lookup, role switching, and news lookup.
    functions:
      - web_search
      - get_weather
      - get_news_from_newsnow
      - play_music
  function_call:
    # Do not change this type value
    type: function_call
    # Modules under plugins_func/functions — pick which ones to load. Once loaded,
    # the conversation will support the matching function calls.
    # "handle_exit_intent" and "play_music" are already loaded by default — don't
    # load them again here.
    # Below is an example loading weather lookup, role switching, and news lookup.
    functions:
      - change_role
      - web_search                  # Web search
      - get_weather
      # - search_from_ragflow
      # - get_news_from_chinanews
      - get_news_from_newsnow
      # play_music is the server's built-in music player. hass_play_music controls
      # music through an external Home Assistant program instead.
      # If using hass_play_music, do not also enable play_music — pick one.
      - play_music
      #- hass_get_state
      #- hass_set_state
      #- hass_play_music

Memory:
  mem0ai:
    type: mem0ai
    # https://app.mem0.ai/dashboard/api-keys
    # 1000 free calls per month
    api_key: your_mem0ai_api_key
  powermem:
    # PowerMem is OceanBase's open-source agent memory component, summarized via a
    # local LLM.
    # Cost: PowerMem itself is free; actual cost depends on the LLM and database used.
    # - sqlite + a free LLM (e.g. glm-4-flash) = completely free
    # - cloud LLM or cloud database = billed per that service
    # GitHub: https://github.com/oceanbase/powermem
    # Website: https://www.powermem.ai/
    # Examples: https://github.com/oceanbase/powermem/tree/main/examples
    type: powermem
    # Whether to enable the user-profile feature
    # - false: standard memory mode (AsyncMemory)
    # - true: user-profile mode (UserMemory), automatically extracts user info
    # User-profile mode supports: oceanbase, seekdb, sqlite (powermem 0.3.0+)
    enable_user_profile: true
    # ========== LLM settings ==========
    # Qwen: https://bailian.console.aliyun.com/?apiKey=1#/api-key
    # Zhipu AI (free): https://bigmodel.cn/usercenter/proj-mgmt/apikeys
    llm:
      provider: openai  # options: qwen, openai, zhipu, etc.
      config:
        api_key: your_llm_api_key
        model: qwen-plus
        # openai_base_url: https://api.openai.com/v1  # optional, custom endpoint
    # ========== Embedding settings ==========
    embedder:
      provider: openai  # options: qwen, openai, etc.
      config:
        api_key: your_embedding_api_key
        model: text-embedding-v4
        openai_base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
        # embedding_dims: 1024  # vector dimensions, required if not 1536

    # ========== Database settings ==========
    # oceanbase (recommended, best performance), seekdb (recommended, integrated
    # AI-app storage), postgres, sqlite (lightweight fallback)
    # User-profile mode supports: oceanbase, seekdb, sqlite
    vector_store:
      provider: sqlite
      config: {}  # SQLite needs no extra config
      # OceanBase config example:
      # provider: oceanbase
      # config:
      #   host: 127.0.0.1
      #   port: 2881
      #   user: root@test
      #   password: your_password
      #   db_name: powermem
      #   collection_name: memories  # default table name — if dimension errors occur, drop or rename this table
      #   embedding_model_dims: 1024  # embedding vector size — must match your model (e.g. Zhipu's embedding-2 is 1024, embedding-3 is 2048)
  nomem:
    # Use this if you don't want memory features at all
    type: nomem
  mem_local_short:
    # Local memory — summarized by whichever LLM is set in selected_module, stored
    # only on your local server, never uploaded anywhere.
    type: mem_local_short
    # Optional dedicated "thinking" model for memory storage.
    # If left blank, defaults to whatever model is set in selected_module.LLM.
    # If you don't want to use selected_module.LLM for memory storage, it's best to
    # use a separate LLM here — e.g. the free ChatGLMLLM.
    llm: ChatGLMLLM

# ─── ASR (Speech-to-Text) PROVIDERS ──────────────────────────────────────────────────
# Trimmed to: FunASR (in use, local) + TencentASR (cloud reference example)
ASR:
  FunASR:
    type: fun_local
    model_dir: models/SenseVoiceSmall
    output_dir: tmp/
  TencentASR:
    # Get your token here: https://console.cloud.tencent.com/cam/capi
    # Free resource quota: https://console.cloud.tencent.com/asr/resourcebundle
    type: tencent
    appid: your_tencent_speech_service_appid
    secret_id: your_tencent_speech_service_secret_id
    secret_key: your_tencent_speech_service_secret_key
    output_dir: tmp/

VAD:
  SileroVAD:
    type: silero
    threshold: 0.5
    threshold_low: 0.3
    model_dir: models/snakers4_silero-vad
    min_silence_duration_ms: 200  # Increase this if users tend to pause longer mid-sentence

# ─── LLM PROVIDERS ────────────────────────────────────────────────────────────────────
# Trimmed to: OllamaLLM (in use, local) + OpenAILLM (cloud reference example)
LLM:
  # All "openai" type providers support the same hyperparameters shown below.
  OllamaLLM:
    # Defines the LLM API type
    type: ollama
    model_name: qwen2.5 # Model name — must be pulled locally first via "ollama pull"
    base_url: http://localhost:11434  # Ollama server address
  OpenAILLM:
    # Defines the LLM API type — works with the official OpenAI API or any
    # OpenAI-compatible endpoint (just change base_url)
    type: openai
    # Get your API key here: https://platform.openai.com/settings/organization/api-keys
    base_url: https://api.openai.com/v1
    model_name: gpt-4o-mini
    api_key: your_openai_api_key
    temperature: 0.7  # Sampling temperature
    max_tokens: 500   # Max tokens to generate
    top_p: 1
    frequency_penalty: 0  # Frequency penalty

# VLLM configuration (vision-language model)
# Trimmed to: ChatGLMVLLM (free reference) + QwenVLVLLM (cloud reference example)
VLLM:
  ChatGLMVLLM:
    type: openai
    # glm-4v-flash is Zhipu AI's free vision model — create an API key on their
    # platform first.
    # Get your API key here: https://bigmodel.cn/usercenter/proj-mgmt/apikeys
    model_name: glm-4v-flash  # Zhipu AI's vision model
    url: https://open.bigmodel.cn/api/paas/v4/
    api_key: your_api_key
  QwenVLVLLM:
    type: openai
    model_name: qwen3.5-flash
    url: https://dashscope.aliyuncs.com/compatible-mode/v1
    # Get your API key here: https://bailian.console.aliyun.com/?apiKey=1#/api-key
    api_key: your_api_key

# ─── TTS (Text-to-Speech) PROVIDERS ───────────────────────────────────────────────────
# Trimmed to: EdgeTTS (in use, free) + OpenAITTS (cloud reference example)
TTS:
  EdgeTTS:
    # Defines the TTS API type
    type: edge
    voice: en-US-AriaNeural
    output_dir: tmp/
    # language: "English"  # Output language — set based on the voice's supported language. Defaults to Chinese if left blank.
  OpenAITTS:
    # OpenAI's official text-to-speech service — supports most major languages
    type: openai
    # Get your API key here: https://platform.openai.com/api-keys
    api_key: your_openai_api_key
    # If accessing from mainland China, you'll likely need a proxy
    api_url: https://api.openai.com/v1/audio/speech
    # tts-1 (faster) or tts-1-hd (higher quality)
    model: tts-1
    # Voice options: alloy, echo, fable, onyx, nova, shimmer
    voice: onyx
    # Speed range 0.25-4.0
    speed: 1
    output_dir: tmp/
    # language: "English"  # Output language — set based on the voice's supported language. Defaults to Chinese if left blank.